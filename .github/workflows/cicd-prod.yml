name: Deploy Barketsalah (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            #!/bin/bash
            set -e

            CONTAINER="pwd-backend-1"
            COMPOSE_FILE="/home/ubuntu/frappe_docker/pwd.yml"

            echo "==================================="
            echo "🚀 Starting Barketsalah Deployment"
            echo "📅 Date: $(date)"
            echo "==================================="

            # Git pull inside container
            echo "📥 Pulling latest code..."
            docker exec $CONTAINER bash -c "cd /home/frappe/frappe-bench/apps/barketsalah && git pull upstream main"

            # Migrate
            echo "🧬 Running migrations..."
            docker exec $CONTAINER bash -c "cd /home/frappe/frappe-bench && bench --site frontend migrate"

            # Clear cache
            echo "🧹 Clearing cache..."
            docker exec $CONTAINER bash -c "cd /home/frappe/frappe-bench && bench --site frontend clear-cache"

            # Build assets
            echo "🏗️ Building assets..."
            docker exec $CONTAINER bash -c "cd /home/frappe/frappe-bench && bench build --app barketsalah"

            # Restart
            echo "🔁 Restarting services..."
            docker compose -f $COMPOSE_FILE restart backend queue-long queue-short scheduler websocket

            echo "==================================="
            echo "✅ Deployment completed!"
            echo "==================================="

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"✅ *Barketsalah Deploy Başarılı!*\n📦 Repo: *${{ github.repository }}*\n🌿 Branch: *${{ github.ref_name }}*\n👤 Committer: *${{ github.actor }}*\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Pipeline Logları>\"
            }"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"❌ *Barketsalah Deploy HATASI!*\n📦 Repo: *${{ github.repository }}*\n🌿 Branch: *${{ github.ref_name }}*\n👤 Committer: *${{ github.actor }}*\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Pipeline Logları>\"
            }"