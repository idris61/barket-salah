name: Deploy Cargo (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 30

    steps:
      - name: Trigger Server-Side Docker Build & Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST_BARKET }}
          username: ${{ secrets.EC2_USER_BARKET }}
          key: ${{ secrets.EC2_SSH_KEY_BARKET }}
          port: 22
          command_timeout: 25m # Building the image takes a few minutes
          envs: GH_TOKEN
          script: |
            # Pass the GH_TOKEN to the environment and execute the deploy script
            export GH_TOKEN=$GH_TOKEN
            bash /home/ubuntu/frappe_docker/deploy_production.sh

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"✅ *Barketsalah Deploy Başarılı!*\n📦 Repo: *${{ github.repository }}*\n🌿 Branch: *${{ github.ref_name }}*\n👤 Committer: *${{ github.actor }}*\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Pipeline Logları>\"
            }"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"❌ *Barketsalah Deploy HATASI!*\n📦 Repo: *${{ github.repository }}*\n🌿 Branch: *${{ github.ref_name }}*\n👤 Committer: *${{ github.actor }}*\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Pipeline Logları>\"
            }"
